<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Insert row in a table</title>
  </head>
  <body>
    <table id="sampleTable" border="1">
      <tr>
        <td>Row1 cell1</td>
        <td>Row1 cell2</td>
      </tr>
      <tr>
        <td>Row2 cell1</td>
        <td>Row2 cell2</td>
      </tr>
    </table><br>
    <input type="button" onclick="insert_Row()" value="Insert row">

    <script>
      function insert_Row() {
        // Step 1: Select the table by its ID ("sampleTable")
        const table = document.getElementById('sampleTable');
        
        // Step 2: Create a new row in the table using insertRow() method
        // insertRow() adds a new <tr> element at the end of the table
        const newRow = table.insertRow();
        
        // Step 3: Add two cells to the new row using insertCell() method
        // insertCell(index) creates a <td> element at the specified position
        const cell1 = newRow.insertCell(0); // First cell (index 0)
        const cell2 = newRow.insertCell(1); // Second cell (index 1)
        
        // Step 4: Set text content for each cell using textContent property
        cell1.textContent = 'New row cell1';
        cell2.textContent = 'New row cell2';
      }
    </script>
  </body>
</html>
