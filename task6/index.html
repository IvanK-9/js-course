<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dom demo</title>
    <style>
      body {
        display: block;
      }
      .siteheader, .maincontent {
        display: flex;
        justify-content: center;
      }
      .siteheader {
        margin-top: 4em;
        font-size: 2em;
        font-weight: bold;
      }
      .maincontent {
        margin-top: 2em;
        font-size: 1.5em;
        font-weight: bolder;
        color: blue;
      }
    </style>
  </head>
  <body>
    <header class="siteheader">
      <div class="my-Header">Dom test 1</div>        
    </header>
    <main class="maincontent">
    </main>

    <script>
      // Step 1: Select the <main> element using its class name "maincontent"
      // querySelector() method finds the first element that matches the specified selector
      const mainElement = document.querySelector('.maincontent');
      
      // Step 2: Add the text "Ad astra per aspera" to the selected element
      // textContent property sets or returns the text content of an element
      mainElement.textContent = 'Ad astra per aspera';
    </script>
  </body>
</html>
